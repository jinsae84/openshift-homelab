#---------------------------------------------------------------------
# HAProxy Configuration for OpenShift Multi Node
# Bastion IP : 192.168.0.17
# Domain     : ocp.lab
#---------------------------------------------------------------------

#---------------------------------------------------------------------
# Global settings
#---------------------------------------------------------------------
global
    log         127.0.0.1 local2

    chroot      /var/lib/haproxy

    maxconn     4000

    user        haproxy
    group       haproxy

    daemon

    # Stats socket
    stats socket /var/lib/haproxy/stats

    # RHEL system crypto policy
    ssl-default-bind-ciphers PROFILE=SYSTEM
    ssl-default-server-ciphers PROFILE=SYSTEM

#---------------------------------------------------------------------
# Default settings
#---------------------------------------------------------------------
defaults
    log                     global
    mode                    tcp

    option                  dontlognull
    option                  redispatch

    retries                 3

    timeout connect         10s
    timeout client          1m
    timeout server          1m
    timeout check           10s

    maxconn                 3000

#---------------------------------------------------------------------
# HAProxy Statistics Page
# http://192.168.0.17:9000/stats
#---------------------------------------------------------------------
listen stats
    bind *:9000
    mode http

    stats enable
    stats uri /stats
    stats refresh 10s

#---------------------------------------------------------------------
# OpenShift Kubernetes API
# api.ocp.lab:6443
#---------------------------------------------------------------------
frontend ocp-api
    bind *:6443
    default_backend ocp-api-backend

backend ocp-api-backend
    balance roundrobin
    option tcp-check

    server master0 192.168.0.20:6443 check
    server master1 192.168.0.21:6443 check
    server master2 192.168.0.22:6443 check

#---------------------------------------------------------------------
# OpenShift Machine Config Server
# api-int.ocp.lab:22623
#---------------------------------------------------------------------
frontend ocp-machine-config
    bind *:22623
    default_backend ocp-machine-config-backend

backend ocp-machine-config-backend
    balance roundrobin
    option tcp-check

    server master0 192.168.0.20:22623 check
    server master1 192.168.0.21:22623 check
    server master2 192.168.0.22:22623 check

#---------------------------------------------------------------------
# OpenShift HTTP Ingress
# *.apps.ocp.lab:80
#---------------------------------------------------------------------
frontend ocp-http-ingress
    bind *:80
    default_backend ocp-http-ingress-backend

backend ocp-http-ingress-backend
    balance roundrobin
    option tcp-check

    server worker0 192.168.0.23:80 check
    server worker1 192.168.0.24:80 check

#---------------------------------------------------------------------
# OpenShift HTTPS Ingress
# *.apps.ocp.lab:443
#---------------------------------------------------------------------
frontend ocp-https-ingress
    bind *:443
    default_backend ocp-https-ingress-backend

backend ocp-https-ingress-backend
    balance roundrobin
    option tcp-check

    server worker0 192.168.0.23:443 check
    server worker1 192.168.0.24:443 check
